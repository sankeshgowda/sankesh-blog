<div class="col-md-6 col-xl-4">
  <article class="post-card glass-card h-100">
    {% if post.featured_image %}<img src="{{ post.featured_image.url }}" alt="{{ post.title }}">{% endif %}
    <div class="p-4">
      <div class="meta">{{ post.category|default:"General" }} · {{ post.reading_time }} min read</div>
      <h3><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h3>
      <p>{{ post.summary|truncatechars:140 }}</p>
      <div class="d-flex justify-content-between align-items-center">
        <a href="{% url 'blog:author' post.author.username %}">@{{ post.author.username }}</a>
        <span>{{ post.view_count }} views</span>
      </div>
    </div>
  </article>
</div>
