{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<section class="auth-page"><div class="auth-card glass-card">
  <h1>Create account</h1>
  <form method="post" action="{% url 'account_signup' %}">{% csrf_token %}{{ form|crispy }}<button class="btn btn-primary w-100" type="submit">Register</button></form>
  <p class="mt-3 mb-0">Already writing here? <a href="{% url 'account_login' %}">Login</a></p>
</div></section>
{% endblock %}
