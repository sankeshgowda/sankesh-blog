{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<section class="auth-page"><div class="auth-card glass-card">
  <h1>Welcome back</h1>
  <form method="post" action="{% url 'account_login' %}">{% csrf_token %}{{ form|crispy }}<button class="btn btn-primary w-100" type="submit">Login</button></form>
  <p class="mt-3 mb-0"><a href="{% url 'account_reset_password' %}">Forgot password?</a> · <a href="{% url 'account_signup' %}">Create account</a></p>
</div></section>
{% endblock %}
