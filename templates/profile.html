{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<section class="page-header"><div class="container"><h1>Profile Settings</h1><p>Keep your author presence current.</p></div></section>
<section class="container py-5"><div class="glass-card p-4">
  <form method="post" enctype="multipart/form-data">{% csrf_token %}{{ user_form|crispy }}{{ profile_form|crispy }}<button class="btn btn-primary">Save Profile</button></form>
</div></section>
{% endblock %}
