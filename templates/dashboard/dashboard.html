{% extends "base.html" %}
{% load static %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">{% endblock %}
{% block content %}
<section class="dashboard-wrap container py-5">
  {% include "dashboard/nav.html" %}
  <div class="dashboard-main">
    <div class="section-heading"><h1>Dashboard</h1><a class="btn btn-primary" href="{% url 'dashboard:post_create' %}">New Post</a></div>
    <div class="stat-grid">
      <div class="glass-card stat"><span>Total Posts</span><strong>{{ post_count }}</strong></div>
      <div class="glass-card stat"><span>Published</span><strong>{{ published_count }}</strong></div>
      <div class="glass-card stat"><span>Drafts</span><strong>{{ draft_count }}</strong></div>
      <div class="glass-card stat"><span>Views</span><strong>{{ total_views }}</strong></div>
    </div>
    <div class="glass-card p-4 mt-4"><canvas id="viewsChart" data-labels="{{ chart_labels|join:',' }}" data-values="{{ chart_values|join:',' }}"></canvas></div>
  </div>
</section>
{% endblock %}
